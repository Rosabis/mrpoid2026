# 在 GitHub Actions 上编译 lib（含 NDK/CMake）与 app，并上传 APK / 原生库产物
name: Android CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

jobs:
  build:
    name: Build APK (lib + app)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager "ndk;23.1.7779620" "cmake;3.22.1" "platforms;android-33" "build-tools;33.0.2"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.1.7779620" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 依赖关系会一并编译 :lib（native），无需单独 assemble lib
      - name: Assemble Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: List native outputs
        run: |
          echo "=== lib/distribution (*.a) ==="
          find lib/distribution -name "*.a" -print 2>/dev/null || true
          echo "=== lib/build (*.so) ==="
          find lib/build -name "*.so" -print 2>/dev/null | head -50

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mrpoid-native
          path: |
            lib/distribution/**/*.a
            lib/build/**/*.so
            lib/build/**/*.aar
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mrpoid-apk-debug
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

  release:
    name: Release on tag
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          name: mrpoid-native
          path: release-native

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: mrpoid-apk-debug
          path: release-apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-native/**/*.aar
            release-native/**/*.a
            release-native/**/*.so
            release-apk/**/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
