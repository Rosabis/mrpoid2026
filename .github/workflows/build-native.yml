# 在 GitHub Actions 上编译 lib（含 NDK/CMake）与 app，并上传 APK / 原生库产物
name: Android CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
  UNICORN_VERSION: "1.0.3"

jobs:
  build:
    name: Build APK (lib + app)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager "ndk;23.1.7779620" "cmake;3.22.1" "platforms;android-33" "build-tools;33.0.2"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.1.7779620" >> $GITHUB_ENV

      - name: Build Unicorn ${{ env.UNICORN_VERSION }} for Android
        shell: bash
        run: |
          set -euxo pipefail

          UNICORN_DIR="$GITHUB_WORKSPACE/lib/src/main/jni/third_party/unicorn"
          BUILD_ROOT="$RUNNER_TEMP/unicorn-${UNICORN_VERSION}"

          rm -rf "$BUILD_ROOT"
          git clone --depth 1 --branch "$UNICORN_VERSION" https://github.com/unicorn-engine/unicorn.git "$BUILD_ROOT/src"

          python3 - "$BUILD_ROOT/src" <<'PY'
          import sys
          from pathlib import Path

          root = Path(sys.argv[1])
          header = root / "qemu/include/qemu/host-utils.h"
          source = root / "qemu/util/host-utils.c"
          header.write_text(header.read_text().replace("#ifdef CONFIG_INT128", "#if defined(CONFIG_INT128) && defined(__SIZEOF_INT128__)"), newline="")
          source.write_text(source.read_text().replace("#ifndef CONFIG_INT128", "#if !defined(CONFIG_INT128) || !defined(__SIZEOF_INT128__)"), newline="")
          PY

          rm -rf "$UNICORN_DIR/include" "$UNICORN_DIR/lib"
          mkdir -p "$UNICORN_DIR/include" "$UNICORN_DIR/lib"
          cp -R "$BUILD_ROOT/src/include/." "$UNICORN_DIR/include/"

          for ABI in armeabi-v7a arm64-v8a x86 x86_64; do
            case "$ABI" in
              armeabi-v7a|x86) ANDROID_PLATFORM=android-19 ;;
              arm64-v8a|x86_64) ANDROID_PLATFORM=android-21 ;;
            esac

            cmake -S "$BUILD_ROOT/src" -B "$BUILD_ROOT/build-$ABI" \
              -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="$ABI" \
              -DANDROID_PLATFORM="$ANDROID_PLATFORM" \
              -DUNICORN_ARCH=arm \
              -DUNICORN_BUILD_TESTS=OFF \
              -DUNICORN_BUILD_SAMPLES=OFF \
              -DUNICORN_INSTALL=OFF \
              -DBUILD_SHARED_LIBS=ON \
              -DCMAKE_BUILD_TYPE=Release
            cmake --build "$BUILD_ROOT/build-$ABI" --config Release --parallel 2

            mkdir -p "$UNICORN_DIR/lib/$ABI"
            cp "$BUILD_ROOT/build-$ABI/libunicorn.so" "$UNICORN_DIR/lib/$ABI/libunicorn.so"
          done

          grep -q "#define UC_API_MAJOR 1" "$UNICORN_DIR/include/unicorn/unicorn.h"
          grep -q "#define UC_API_MINOR 0" "$UNICORN_DIR/include/unicorn/unicorn.h"
          grep -q "#define UC_VERSION_EXTRA 3" "$UNICORN_DIR/include/unicorn/unicorn.h"
          test "$(find "$UNICORN_DIR/lib" -name libunicorn.so | wc -l)" -eq 4
          find "$UNICORN_DIR/lib" -name libunicorn.so -print

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 依赖关系会一并编译 :lib（native），无需单独 assemble lib
      - name: Assemble Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: List native outputs
        run: |
          echo "=== lib/distribution (*.a) ==="
          find lib/distribution -name "*.a" -print 2>/dev/null || true
          echo "=== lib/build (*.so) ==="
          find lib/build -name "*.so" -print 2>/dev/null | head -50

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mrpoid-native
          path: |
            lib/distribution/**/*.a
            lib/src/main/jni/third_party/unicorn/lib/**/*.so
            lib/build/**/*.so
            lib/build/**/*.aar
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mrpoid-apk-debug
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

  release:
    name: Release on tag
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          name: mrpoid-native
          path: release-native

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: mrpoid-apk-debug
          path: release-apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-native/**/*.aar
            release-native/**/*.a
            release-native/**/*.so
            release-apk/**/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
